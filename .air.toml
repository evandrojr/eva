root = "."
testdata_dir = ""
tmp_dir = "tmp"

[build]
  cmd = "go build -o eva . && sudo systemctl restart eva"
  delay = 1000
  exclude_dir = ["vendor"]
  exclude_file = []
  exclude_regex = ["(_test\\.go|_mock\\.go)$"]
  exclude_unchanged = false
  follow_symlinks = false
  full_bin = "./eva"
  include_dir = ["web"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = ""
  poll = false
  poll_interval = 0
  rerun = false
  run_on_init = false
  stdin_on_init = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = false
  catlen = 0
  use_color = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true